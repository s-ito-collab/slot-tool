<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>スロ癖アナライザー</title>
<style>
:root{color-scheme:light;
 --surface:#fcfcfb;--page:#f9f9f7;--ink:#0b0b0b;--ink2:#52514e;--muted:#898781;
 --grid:#e1e0d9;--axis:#c3c2b7;--border:rgba(11,11,11,.10);
 --accent:#2a78d6;--accent2:#1c5cab;--pos:#2a78d6;--neg:#e34948;--mid:#f0efec;--good:#006300;}
@media (prefers-color-scheme: dark){:root{color-scheme:dark;
 --surface:#1a1a19;--page:#0d0d0d;--ink:#fff;--ink2:#c3c2b7;--muted:#898781;
 --grid:#2c2c2a;--axis:#383835;--border:rgba(255,255,255,.10);
 --accent:#3987e5;--accent2:#5598e7;--pos:#3987e5;--neg:#e66767;--mid:#383835;--good:#0ca30c;}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--page);color:var(--ink);padding-bottom:40px}
header{position:sticky;top:0;background:var(--page);z-index:5;border-bottom:1px solid var(--border);padding:10px 14px 0}
h1{font-size:17px;font-weight:700;padding-bottom:8px}
.tabs{display:flex;gap:4px}
.tab{flex:1;text-align:center;padding:10px 4px;font-size:13px;font-weight:600;color:var(--ink2);border-bottom:2px solid transparent;cursor:pointer}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:12px 14px 4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 14px;border-radius:18px;background:var(--surface);border:1px solid var(--border);font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer;min-height:36px}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
main{padding:0 14px;max-width:760px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-top:12px}
h2{font-size:14px;font-weight:700}
.desc{font-size:11px;color:var(--ink2);margin:2px 0 10px;line-height:1.6}
.sub{font-size:11px;color:var(--ink2);line-height:1.7;margin-top:10px}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px}
.tile .l{font-size:10px;color:var(--ink2)}
.tile .v{font-size:20px;font-weight:700;margin-top:1px}
.tile .s{font-size:10px;color:var(--muted);margin-top:1px}
.bars{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:6px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bar{width:80%;background:var(--accent);border-radius:4px 4px 0 0;min-height:2px}
.blab{font-size:10px;color:var(--muted);margin-top:5px}
.bval{font-size:10px;color:var(--ink2);margin-bottom:3px;font-variant-numeric:tabular-nums}
.axisline{border-top:1px solid var(--axis)}
.domgrid{display:flex;align-items:flex-end;gap:2px;height:90px}
.domgrid .bcol .bar{width:100%;border-radius:2px 2px 0 0}
.domgrid .blab{font-size:8px}
.tablewrap{overflow-x:auto;margin:0 -16px;padding:0 16px}
table{border-collapse:collapse;font-size:12px;min-width:100%}
th{color:var(--ink2);font-weight:600;text-align:right;padding:6px 8px;border-bottom:1px solid var(--grid);white-space:nowrap;font-size:11px}
th:first-child,td:first-child{text-align:left}
td{padding:6px 8px;border-bottom:1px solid var(--grid);text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
td.name{max-width:150px;overflow:hidden;text-overflow:ellipsis;text-align:left}
.cell{border-radius:4px;padding:2px 6px;display:inline-block;min-width:48px;text-align:right}
.reco{line-height:1.9;font-size:13px}
.reco .tag{display:inline-block;background:var(--mid);border-radius:4px;padding:1px 7px;font-size:11px;margin-right:4px}
.reco li{margin:6px 0 6px 2px;list-style:none}
.warn{font-size:11px;color:var(--ink2);border-left:3px solid var(--axis);padding:2px 0 2px 10px;margin-top:12px;line-height:1.7}
.note{font-size:10px;color:var(--muted);margin-top:8px;line-height:1.6}
textarea{width:100%;min-height:140px;background:var(--surface);color:var(--ink);border:1px solid var(--border);border-radius:10px;padding:10px;font-size:13px}
button.go{width:100%;margin-top:10px;padding:13px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.hide{display:none}
.updated{font-size:10px;color:var(--muted);margin-top:8px;text-align:right}
.dsearch{display:flex;gap:8px;margin-bottom:10px}
.dsearch input{flex:1;background:var(--surface);color:var(--ink);border:1px solid var(--border);border-radius:10px;padding:11px;font-size:16px}
.dsearch button{padding:11px 18px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.spark{display:flex;align-items:center;gap:1px;height:64px}
.spark .sp{flex:1;display:flex;flex-direction:column;justify-content:center;height:100%}
.spark .up,.spark .dn{width:100%;border-radius:1px;min-height:1px}
.spark .up{background:var(--pos);align-self:flex-end}
.spark .dn{background:var(--neg);align-self:flex-start}
.spark .z{height:1px;background:var(--grid)}
.sphalf{display:flex;flex-direction:column;height:100%;justify-content:center}
.daistat{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.daistat span{background:var(--mid);border-radius:6px;padding:3px 8px;font-size:11px}
.dairow{cursor:pointer}
.dairow:active{background:var(--mid)}
</style>
</head>

/* ---------- shared renderers ---------- */
function tilesHtml(K,ev,wd){
  const wbest=wd.reduce((a,b)=>b.avg>a.avg?b:a),wworst=wd.reduce((a,b)=>b.avg<a.avg?b:a);
  const t=[["最強の曜日",wbest.d+"曜","平均差枚 +"+wbest.avg],
    ev?["イベント日","+"+ev.avg,"通常日 +"+ev.norm_avg+"（"+esc(ev.label)+"）"]:["全体平均","+"+K.overall,"公開日ベース"],
    ["分析日数",K.days+"日","差枚公開 "+K.pub+"日"],
    ["最弱の曜日",wworst.d+"曜","平均差枚 +"+wworst.avg]];
  return '<div class="tiles">'+t.map(x=>`<div class="tile"><div class="l">${x[0]}</div><div class="v">${x[1]}</div><div class="s">${x[2]}</div></div>`).join('')+'</div>';
}
function barsHtml(wd){
  const mx=Math.max(...wd.map(w=>w.avg),1);
  return '<div class="bars">'+wd.map(w=>
    `<div class="bcol"><div class="bval">${w.avg}</div><div class="bar" style="height:${Math.max(2,w.avg/mx*100)}%"></div><div class="blab">${w.d}</div></div>`).join('')+'</div><div class="axisline"></div>';
}
function domHtml(dom,evtDays){
  const mx=Math.max(...dom.map(x=>x.avg??0),1);
  return '<div class="domgrid">'+dom.map(x=>{
    const hot=evtDays&&evtDays(x.day);
    return `<div class="bcol"><div class="bar" style="height:${Math.max(2,(x.avg??0)/mx*100)}%;${x.avg==null?"background:var(--grid)":hot?"background:var(--accent2)":""}"></div><div class="blab">${x.day}</div></div>`;
  }).join('')+'</div><div class="axisline"></div>';
}
function cellStyle(v){
  if(v==null) return "background:var(--mid);color:var(--muted)";
  if(Math.abs(v)<60) return "background:var(--mid)";
  const a=Math.min(1,Math.abs(v)/900),c=v>0?"var(--pos)":"var(--neg)";
  if(a>0.45) return `background:${c};color:#fff`;
  return `background:color-mix(in srgb, ${c} ${Math.round(a*90+10)}%, var(--mid))`;
}
function machinesHtml(ms){
  const c=v=>`<td><span class="cell" style="${cellStyle(v)}">${v==null?"-":yen(v)}</span></td>`;
  return '<div class="tablewrap"><table><tr><th>機種</th><th>全体</th><th>イベント日</th><th>土曜</th><th>日曜</th><th>平日</th><th>出率</th></tr>'+
    ms.map(m=>`<tr><td class="name">${esc(m.name)}</td>${c(m.all)}${c(m.evt)}${c(m.sat)}${c(m.sun)}${c(m.norm)}<td>${m.rate?m.rate.toFixed(1)+"%":"-"}</td></tr>`).join('')+'</table></div>';
}
function symbolsHtml(sym,min){
  return '<div class="tablewrap"><table><tr><th>機種</th><th>スコア</th><th>☆</th><th>◎</th><th>◯</th><th>▲</th></tr>'+
    sym.filter(s=>s["☆"]+s["◎"]+s["◯"]+s["▲"]>=(min||5)).slice(0,25).map(s=>
    `<tr><td class="name">${esc(s.name)}</td><td><b>${s.score>0?"+":""}${s.score}</b></td><td>${s["☆"]}</td><td>${s["◎"]}</td><td>${s["◯"]}</td><td>${s["▲"]}</td></tr>`).join('')+'</table></div>';
}
function daiHtml(dai){
  return '<div class="tablewrap"><table><tr><th>台番</th><th>主な設置機種</th><th>90日合計</th><th>+2000枚</th></tr>'+

}

/* ---------- 設定判別（Aタイプ・ボーナス確率） ---------- */
// 公表値ベースの設定別ボーナス確率（1/x）。設定1→6の順。該当しない機種は店内同機種比較で判定。
const SETTING_TABLES=[
 {match:"マイジャグラーV", bb:[273.1,270.8,266.4,254.0,240.1,229.1], rb:[409.6,385.5,336.1,290.0,268.6,229.1]},
 {match:"アイムジャグラーEX", bb:[273.1,269.7,269.7,259.0,259.0,255.0], rb:[439.8,399.6,331.0,315.1,255.0,255.0]},
 {match:"ゴーゴージャグラー３", bb:[259.0,258.0,257.0,254.0,247.3,234.9], rb:[354.2,332.7,306.2,268.6,247.3,234.9]},
 {match:"ファンキージャグラー２", bb:[266.4,259.0,256.0,249.2,240.1,219.9], rb:[439.8,407.1,366.1,322.8,299.3,262.1]},
 {match:"ハッピージャグラー", bb:[273.1,270.8,263.2,254.0,239.2,226.0], rb:[397.2,362.1,332.7,300.6,273.1,240.1]},
 {match:"キングハナハナ", bb:[297.9,285.8,278.9,270.8,254.0,240.1], rb:[496.5,470.1,443.7,417.4,390.1,364.1]},
 {match:"ハナハナホウオウ", bb:[299.3,290.0,282.5,273.1,259.0,242.7], rb:[534.5,507.0,478.4,451.0,417.4,390.1]},
];
function isAType(s){return s.bb>=10&&s.rb>=10&&s.gs>=3000;}
function estFromArr(rate,arr){ // rate=1/x の x。arr は設定1→6。値が小さいほど高設定
  if(rate>=arr[0])return 1;
  if(rate<=arr[5])return 6;
  for(let i=0;i<5;i++) if(rate<=arr[i]&&rate>=arr[i+1]){
    const span=arr[i]-arr[i+1];
    return i+1+(span>0?(arr[i]-rate)/span:0.5);
  }
  return 1;
}
function judgeSetting(h,ban,s){
  if(!isAType(s))return null;
  const bbR=s.gs/s.bb, rbR=s.gs/s.rb, gok=s.gs/(s.bb+s.rb);
  const payout=1+s.total/(3*s.gs);
  const conf=s.gs>=15000?"":s.gs>=6000?"（やや参考）":"（G数少・参考）";
  const tbl=SETTING_TABLES.find(t=>s.n.includes(t.match));
  if(tbl){
    const gokArr=tbl.bb.map((b,i)=>1/(1/b+1/tbl.rb[i]));
    const est=0.6*estFromArr(rbR,tbl.rb)+0.4*estFromArr(gok,gokArr);
    const label=est>=4.8?"設定5-6域":est>=3.8?"設定4以上示唆":est>=2.8?"中間設定域":"低設定域";
    return {est,label:label+conf,bbR,rbR,gok,payout,method:"公表値"};
  }
  // 同機種内比較
  const peers=Object.values(h.dai30.dai).filter(p=>p.n===s.n&&isAType(p));
  if(peers.length>=3){
    const med=a=>{const b=[...a].sort((x,y)=>x-y);return b[Math.floor(b.length/2)];};
    const mRb=med(peers.map(p=>p.gs/p.rb)), mGok=med(peers.map(p=>p.gs/(p.bb+p.rb)));
    const score=0.6*(mRb/rbR)+0.4*(mGok/gok);
    const est=score>=1.1&&payout>=1.03?4.5:score>=1.05?3.5:score>=0.97?2.5:1.5;
    const label=est>=4?"同機種内で優秀（高設定候補）":est>=3?"同機種内やや上位":est>=2?"同機種内平均域":"同機種内下位";
    return {est,label:label+conf,bbR,rbR,gok,payout,method:"店内比較"};
  }
  return {est:null,label:"比較対象不足",bbR,rbR,gok,payout,method:"-"};
}
function settingBadge(h,ban,s){
  const j=judgeSetting(h,ban,s);
  if(!j||j.est==null)return "";
  if(j.est>=4.5)return '<span style="color:var(--good);font-weight:700">◎高設定挙動</span>';
  if(j.est>=3.5)return '<span style="color:var(--accent);font-weight:700">◯上位挙動</span>';
  return "";
}
function settingCardHtml(h){
  const D=h.dai30;if(!D)return"";
  const rows=[];
  for(const [ban,s] of Object.entries(D.dai)){
    const j=judgeSetting(h,ban,s);
    if(j&&j.est!=null)rows.push({ban,s,j});
  }
  if(!rows.length)return"";
  rows.sort((a,b)=>b.j.est-a.j.est||b.j.payout-a.j.payout);
  const f1=v=>"1/"+v.toFixed(1);
  return `<div class="card"><h2>Aタイプ設定判別（30日累計ボーナス確率）</h2>
  <div class="desc">BB・RB両方があるノーマルタイプのみ。判定は「公表値」照合または「店内比較」（同機種内の相対評価）。行タップで台詳細。</div>
  <div class="tablewrap"><table><tr><th>台番</th><th>機種</th><th>G数</th><th>BB率</th><th>RB率</th><th>合成</th><th>出率</th><th>判定</th></tr>
  ${rows.slice(0,15).map(r=>`<tr data-ban="${esc(r.ban)}" class="dairow"><td><b>${esc(r.ban)}</b></td><td class="name">${esc(r.s.n)}</td><td>${r.s.gs.toLocaleString()}</td><td>${f1(r.j.bbR)}</td><td>${f1(r.j.rbR)}</td><td>${f1(r.j.gok)}</td><td>${(r.j.payout*100).toFixed(1)}%</td><td style="font-size:11px">${r.j.label}</td></tr>`).join("")}</table></div>
  <div class="note">30日累計でもボーナス確率のブレは大きく、確率が良い＝高設定の証明ではありません。据え置き傾向・イベント日の挙動と合わせて判断してください。公表値テーブル非搭載の新機種は店内比較のみです。</div></div>`;
}

/* ---------- 日付で狙い台 ---------- */
function dateTargetsHtml(h,dateStr){
  const D=h.dai30;if(!D||!dateStr)return"";
  const d=new Date(dateStr+"T00:00:00");
  if(isNaN(d))return'<div class="desc">日付を選択してください。</div>';
  const wd=(d.getDay()+6)%7; // 0=月
  const isEvt=h._evtFn(d.getDate());
  const typeLabel=isEvt?`イベント日（${esc(h.event)}該当）`:wd===5?"土曜":wd===6?"日曜":"平日（"+"月火水木金土日"[wd]+"曜）";
  const idxs=D.meta.map((m,i)=>[m,i]).filter(([m])=>isEvt?m[1]===1:(wd===5?m[0]===5:wd===6?m[0]===6:(m[0]<=4&&m[1]===0))).map(([,i])=>i);
  // 同タイプ日の全台平均勝率 p0（ベイズ補正の事前分布）
  let W=0,N=0;
  for(const s of Object.values(D.dai)){
    idxs.forEach(i=>{const r=s.rows[i];if(r&&r[1]>300){N++;if(r[0]>0)W++;}});
  }
  const p0=N?W/N:0.4, M=10; // M=補正強度。バックテストでm=8〜15が最良、10を採用
  const list=[];
  for(const [ban,s] of Object.entries(D.dai)){
    let win=0,n=0,sum=0;
    idxs.forEach(i=>{const r=s.rows[i];if(r&&r[1]>300){n++;sum+=r[0];if(r[0]>0)win++;}});
    if(n>=3)list.push({ban,s,win,n,avg:sum/n,score:(win+p0*M)/(n+M)});
  }
  // 補正付き勝率で並べる（平均差枚は表示のみ。差枚ベース選出はバックテストで逆効果と判明）
  list.sort((a,b)=>b.score-a.score||b.avg-a.avg);
  const top=list.slice(0,15);
  if(!top.length)return'<div class="desc">該当タイプの日のサンプルが不足しています。</div>';
  return `<div class="desc" style="margin-top:8px"><b>${d.getMonth()+1}/${d.getDate()}（${"月火水木金土日"[wd]}）＝ ${typeLabel}</b> ｜ 直近30日中の同タイプ${idxs.length}日の実績。全台平均勝率 ${(p0*100).toFixed(0)}%</div>
  <div class="tablewrap"><table><tr><th>台番</th><th>機種</th><th>補正勝率</th><th>実績</th><th>平均差枚</th><th>設定シグナル</th></tr>
  ${top.map(x=>`<tr data-ban="${esc(x.ban)}" class="dairow"><td><b>${esc(x.ban)}</b></td><td class="name">${esc(x.s.n)}</td><td><b>${(x.score*100).toFixed(0)}%</b></td><td>${x.win}/${x.n}</td><td style="color:${x.avg>0?'var(--good)':'var(--neg)'}">${yen(x.avg)}</td><td>${settingBadge(h,x.ban,x.s)}</td></tr>`).join("")}</table></div>
  <div class="note">補正勝率＝サンプルが少ない台を全台平均へ引き戻すベイズ補正後の値（「4/4勝」の偶然を過大評価しないため）。並び順は過去データのバックテストで検証済み：この方式の上位台は全台平均（勝率38.5%・+30枚/日）に対し勝率+3pt・平均+170枚/日ほど上回りました。保証ではありません。</div>`;
}

/* ---------- 台番分析 ---------- */
function sparkHtml(rows,dates,evtFn){
  const mx=Math.max(...rows.filter(Boolean).map(r=>Math.abs(r[0])),1);
  return '<div class="spark">'+rows.map((r,i)=>{
    if(!r) return '<div class="sp"><div class="z"></div></div>';
    const h=Math.max(2,Math.abs(r[0])/mx*30);
    const day=parseInt((dates[i].match(/\/(\d+)\(/)||[])[1]||0);
    const op=evtFn&&evtFn(day)?'':'opacity:.55;';
    return `<div class="sp" title="${dates[i]} ${r[0]>0?'+':''}${r[0].toLocaleString()}枚 ${r[1].toLocaleString()}G"><div class="sphalf">`+
      (r[0]>=0?`<div class="up" style="height:${h}px;${op}"></div>`:`<div class="dn" style="height:${h}px;${op}"></div>`)+`</div></div>`;
  }).join('')+'</div>';
}
function daiDetailHtml(h,ban){
  const D=h.dai30;if(!D)return'';
  const s=D.dai[ban];
  if(!s)return `<div class="desc">台${esc(ban)} のデータがありません（未稼働または存在しない台番）。</div>`;
  const gk=s.gokei?`<span>ボーナス合成 1/${s.gokei}（BB${s.bb}/RB${s.rb}）</span>`:'';
  const j=judgeSetting(h,ban,s);
  const jhtml=j?`<div class="desc" style="margin-top:8px"><b>設定判別（${j.method}）: ${esc(j.label)}</b> ｜ BB 1/${j.bbR.toFixed(1)} / RB 1/${j.rbR.toFixed(1)} / 合成 1/${j.gok.toFixed(1)} / 出率 ${(j.payout*100).toFixed(1)}%</div>`:'';
  return `<div style="font-weight:700;font-size:14px;margin-bottom:2px">台${esc(ban)} ${esc(s.n)}</div>${jhtml}
  <div class="desc">直近30日推移（濃い色＝イベント日、バーにタッチで詳細）</div>
  ${sparkHtml(s.rows,D.dates,h._evtFn)}<div class="axisline"></div>
  <div class="daistat">
   <span>30日合計 <b style="color:${s.total>0?'var(--good)':'var(--neg)'}">${yen(s.total)}</b></span>
   <span>勝ち ${s.win}/${s.act}日</span>
   ${s.evt!=null?`<span>イベント日平均 ${yen(s.evt)}</span>`:''}
   ${s.norm!=null?`<span>通常日平均 ${yen(s.norm)}</span>`:''}
   ${gk}
  </div>`;
}
function daiRankHtml(h){
  const D=h.dai30;if(!D)return'';
  const arr=Object.entries(D.dai).map(([ban,s])=>({ban,...s}));
  const top=arr.sort((a,b)=>b.total-a.total).slice(0,10);
  const worst=arr.slice(-5).reverse();
  const row=x=>`<tr data-ban="${esc(x.ban)}" class="dairow"><td><b>${esc(x.ban)}</b></td><td class="name">${esc(x.n)}</td><td style="color:${x.total>0?'var(--good)':'var(--neg)'}">${yen(x.total)}</td><td>${x.win}/${x.act}</td><td>${x.evt!=null?yen(x.evt):'-'}</td></tr>`;
  return `<div class="tablewrap"><table><tr><th>台番</th><th>機種</th><th>30日合計</th><th>勝率</th><th>イベント日</th></tr>
  ${top.map(row).join('')}
  <tr><td colspan="5" style="text-align:center;color:var(--muted);font-size:10px">…ワースト…</td></tr>
  ${worst.map(row).join('')}</table></div>
  <div class="note">行をタップで30日推移を表示</div>`;
}

/* ---------- hall view ---------- */
function renderHall(h){
  const D=h.data;
  const evtDays=(()=>{const lab=D.event?D.event.label:'';const tsuku=[],fixed=[];
    lab.split(/[,、]/).forEach(t=>{t=t.trim().replace('のつく日','');if(!t)return;
      if(t.endsWith('日'))fixed.push(parseInt(t));else tsuku.push(t);});
    return d=>tsuku.some(t=>String(d).includes(t))||fixed.includes(d);})();
  const notes=(h.notes||[]).map(n=>`<li>・${n}</li>`).join('');
  const evDisp=D.event?{...D.event,label:h.event}:null;
  h._evtFn=evtDays;
  $("#hallmain").innerHTML=`
  <div class="sub" style="margin-top:10px">${esc(h.name)}（${esc(h.pref)}） ｜ 旧イベント日: ${esc(h.event)} ｜ 期間: ${D.kpi.period}</div>
  ${tilesHtml(D.kpi,evDisp,D.weekday)}
  ${h.dai30?`<div class="card"><h2>日付で狙い台を探す</h2>
   <div class="desc">行く日を選ぶと、その日タイプ（イベント日/土日/平日）で勝率が高い台をリストアップします。</div>
   <div class="dsearch"><input type="date" id="dateq"><button id="dategoBtn">検索</button></div>
   <div id="dateout"></div></div>`:''}
  <div class="card"><h2>曜日別 平均差枚</h2>${barsHtml(D.weekday)}
    <div class="note">稼働G: ${D.weekday.map(w=>w.d+" "+w.g.toLocaleString()).join(" / ")}</div></div>
  <div class="card"><h2>日付別 平均差枚（1〜31日）</h2><div class="desc">濃い色＝旧イベント日該当</div>${domHtml(D.dom,evtDays)}</div>
  <div class="card"><h2>機種 × 日タイプ（直近90日）</h2><div class="desc">青=プラス、赤=マイナス。横スクロールできます。</div>${machinesHtml(D.machines)}</div>
  <div class="card"><h2>機種優遇度（☆◎◯▲ 12ヶ月）</h2><div class="desc">スコア=☆×3+◎×2+◯−▲</div>${symbolsHtml(D.symbols)}</div>
  <div class="card"><h2>単独設置台（バラエティ枠）</h2><div class="desc">1台のみ設置機種の台番別成績（90日）</div>${daiHtml(D.dai)}</div>
  ${h.dai30?`<div class="card"><h2>台番分析（全${Object.keys(h.dai30.dai).length}台・直近30日）</h2>
   <div class="dsearch"><input type="number" id="daiq" placeholder="台番号を入力（例: 123）" inputmode="numeric"><button id="daigo">表示</button></div>
   <div id="daidetail"></div>
   <div class="desc" style="margin-top:12px">30日合計ランキング</div>${daiRankHtml(h)}</div>`:''}
  ${h.dai30?settingCardHtml(h):''}
  <div class="card"><h2>狙い方まとめ</h2><div class="reco"><ul>${notes}</ul></div>
    <div class="warn">差枚は設定の代理指標です。非公開日を含まないため公開日ベースの数値は上振れします。直近1〜2ヶ月の傾向を優先してください。</div>
    <div class="updated">データ更新: ${h.updated}（更新はClaudeに「ツールのデータ更新して」と依頼）</div></div>`;
  if(h.dai30){
    const show=b=>{$("#daidetail").innerHTML=daiDetailHtml(h,String(b).trim());$("#daidetail").scrollIntoView({behavior:"smooth",block:"center"});};
    window.__showDai=show;
    $("#daigo").onclick=()=>show($("#daiq").value);
    $("#daiq").addEventListener("keydown",e=>{if(e.key==="Enter")show($("#daiq").value);});
    const dq=$("#dateq");
    const runDate=()=>{$("#dateout").innerHTML=dateTargetsHtml(h,dq.value);};
    $("#dategoBtn").onclick=runDate;
    dq.addEventListener("change",runDate);
    const t=new Date();t.setDate(t.getDate()+1); // 明日をデフォルトに
    dq.value=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
    runDate();
  }
}
window.__curHall=null;
document.addEventListener("click",e=>{
  const tr=e.target.closest(".dairow");
  if(tr&&window.__showDai){const q=$("#daiq");if(q)q.value=tr.dataset.ban;window.__showDai(tr.dataset.ban);}

HALLS.forEach((h,i)=>{

/* ---------- tabs ---------- */
document.querySelectorAll(".tab").forEach(t=>{

    $("#view-halls").classList.toggle("hide",t.dataset.tab!=="halls");

/* ---------- paste analyzer ---------- */
function pnum(s){s=String(s).replace(/[+,]/g,"").trim();if(s==="-"||s==="")return null;const v=parseInt(s);return isNaN(v)?null:v;}
function parsePaste(text){
  const evm=text.match(/旧イベント日\s*([^\n※]+)/);
  const dateRe=/(?:(\d{4})\/)?(\d{1,2})\/(\d{1,2})\(([月火水木金土日])\)/g;
  const marks=[...text.matchAll(dateRe)];
  const rows=[];let year=(new Date()).getFullYear();let prevM=null;
  for(let i=0;i<marks.length;i++){
    const m=marks[i];
    const block=text.slice(m.index+m[0].length, i+1<marks.length?marks[i+1].index:text.length);
    let mo=+m[2],da=+m[3];
    if(m[1]) year=+m[1]; else if(prevM!==null&&mo>prevM) year--;
    prevM=mo;
    const d=new Date(year,mo-1,da);
    if("日月火水木金土"[d.getDay()]!==m[4]) continue; // 日付でない断片を除外
    const toks=block.trim().split(/\s+/);
    const total=toks[0]!==undefined?pnum(toks[0]):null;
    const avg=toks[1]!==undefined?pnum(toks[1]):null;
    const tags=toks.slice(3).join("");
    rows.push({date:d,dow:m[4],avg:(toks[0]==="-"?null:avg),tags});
  }
  return {rows,event:evm?evm[1].trim():null};
}
function analyzePaste(){
  const {rows,event}=parsePaste($("#pastebox").value);
  if(rows.length<10){$("#pasteout").innerHTML='<div class="card"><div class="desc">日付データを10日分以上読み取れませんでした。ページ全体をコピーして貼り付けてください。</div></div>';return;}
  const cutoff=new Date();cutoff.setMonth(cutoff.getMonth()-12);
  const recent=rows.filter(r=>r.date>=cutoff);
  const use=recent.length>=30?recent:rows;
  // weekday
  const wd="月火水木金土日".split("").map(d=>{
    const rs=use.filter(r=>r.dow===d&&r.avg!=null);
    return {d,avg:rs.length?Math.round(rs.reduce((a,b)=>a+b.avg,0)/rs.length):0,g:0,n:rs.length};
  });
  // dom
  const dom=[];for(let day=1;day<=31;day++){
    const v=use.filter(r=>r.date.getDate()===day&&r.avg!=null).map(r=>r.avg);
    dom.push({day,avg:v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):null,n:v.length});
  }
  // event days
  let evtFn=null,evStat=null;
  if(event){const tsuku=[],fixed=[];
    event.split(/[,、]/).forEach(t=>{t=t.trim().replace("のつく日","");if(!t)return;
      if(t.endsWith("日"))fixed.push(parseInt(t));else if(/^\d$/.test(t))tsuku.push(t);});
    if(tsuku.length||fixed.length){
      evtFn=d=>tsuku.some(t=>String(d).includes(t))||fixed.includes(d);
      const ev=use.filter(r=>evtFn(r.date.getDate())&&r.avg!=null).map(r=>r.avg);
      const no=use.filter(r=>!evtFn(r.date.getDate())&&r.avg!=null).map(r=>r.avg);
      evStat={label:event,n:ev.length,avg:ev.length?Math.round(ev.reduce((a,b)=>a+b,0)/ev.length):0,
              norm_avg:no.length?Math.round(no.reduce((a,b)=>a+b,0)/no.length):0};
    }}
  // symbols（まどか☆マギカ保護）
  const stat={};
  use.forEach(r=>{
    if(!r.tags)return;
    const prot=r.tags.split("まどか☆マギカ").join("まどか＊マギカ");
    prot.split(/(?=[☆◎◯▲])/).forEach(p=>{
      p=p.trim();if(!p||!"☆◎◯▲".includes(p[0]))return;
      const name=p.slice(1).split("まどか＊マギカ").join("まどか☆マギカ");
      if(!name||name.startsWith("末尾"))return;
      stat[name]=stat[name]||{name,"☆":0,"◎":0,"◯":0,"▲":0};
      stat[name][p[0]]++;
    });
  });
  const sym=Object.values(stat).map(s=>({...s,score:s["☆"]*3+s["◎"]*2+s["◯"]-s["▲"]})).sort((a,b)=>b.score-a.score);
  const pub=use.filter(r=>r.avg!=null);
  const K={days:use.length,pub:pub.length,overall:pub.length?Math.round(pub.reduce((a,b)=>a+b.avg,0)/pub.length):0};
  const best=wd.reduce((a,b)=>b.avg>a.avg?b:a);
  const top=sym.filter(s=>s.score>3).slice(0,5).map(s=>s.name);
  $("#pasteout").innerHTML=`
  ${tilesHtml(K,evStat,wd)}
  <div class="card"><h2>曜日別 平均差枚</h2>${barsHtml(wd)}</div>
  <div class="card"><h2>日付別 平均差枚</h2>${evtFn?'<div class="desc">濃い色＝旧イベント日該当</div>':''}${domHtml(dom,evtFn)}</div>
  <div class="card"><h2>機種優遇度（☆◎◯▲）</h2>${symbolsHtml(sym,3)}</div>
  <div class="card"><h2>ざっくり狙い方</h2><div class="reco">
  <span class="tag">行く日</span><b>${best.d}曜（+${best.avg}）</b>${evStat&&evStat.avg>evStat.norm_avg+30?`、イベント日（${esc(evStat.label)}、+${evStat.avg}）`:""}<br>
  ${top.length?`<span class="tag">優遇機種</span><b>${top.map(esc).join("、")}</b><br>`:""}
  <span class="tag">注意</span>簡易解析です。台単位の詳細はホール分析タブ（Claudeでの収集）が正確です。</div></div>`;
}
$("#parsebtn").onclick=analyzePaste;
</script>
